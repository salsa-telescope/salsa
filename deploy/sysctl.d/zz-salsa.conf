# Larger UDP socket buffers so UHD doesn't drop USRP packets during
# high-throughput IQ streaming. 100 MB should be enough.
#
# Filename starts with "zz-" so this file is loaded LAST and wins
# against /etc/sysctl.d/uhd-usrp2.conf (shipped by libuhd-dev), which
# otherwise overrides our values with smaller defaults.
net.core.rmem_max=100000000
net.core.wmem_max=100000000
