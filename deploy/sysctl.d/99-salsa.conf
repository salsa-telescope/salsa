# Larger UDP socket buffers so UHD doesn't drop USRP packets during
# high-throughput IQ streaming. Sized per UHD's recommendation for any
# 1 GbE-connected USRP (N210, X310, etc.) — 32 MiB gives ~300 ms of
# headroom at 25 MS/s sc16, plenty for OS scheduling jitter.
net.core.rmem_max=33554432
net.core.wmem_max=33554432
