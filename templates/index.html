<!DOCTYPE html>
<html lang="en">
    <head>
        <title>SALSA</title>
        <link rel="stylesheet" href="/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Roboto+Flex:opsz,wght@8..144,300;8..144,400&display=swap" rel="stylesheet">
        <meta charset='UTF-8'/>
        <meta name='viewport'
        content='width=device-width, initial-scale=1.0, maximum-scale=1.0' />
        <!-- <script src="https://unpkg.com/htmx.org@2.0.0"></script> -->
        <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.js" integrity="sha384-oeUn82QNXPuVkGCkcrInrS1twIxKhkZiFfr2TdiuObZ3n3yIeMiqcRzkIcguaof1" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script src="/observation_chart.js"></script>
        <script>
            function toggleNav() {
                document.body.classList.toggle('nav-open');
                document.body.classList.remove('user-open');
            }
            function toggleUser() {
                document.body.classList.toggle('user-open');
                document.body.classList.remove('nav-open');
            }
            function closeAllPanels() {
                document.body.classList.remove('nav-open', 'user-open');
            }
            document.addEventListener('click', function(e) {
                if (!e.target.closest('header, #main-nav, .nav-user-dropdown')) {
                    closeAllPanels();
                }
            });
        </script>
    </head>
    <body>
        <header>
            <div class="header-bar">
                <div id="logo"><a href="/">SALSA</a></div>
                <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                        <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/>
                    </svg>
                </button>
            </div>
            <nav id="main-nav">
                <a href="/about" class="nav-link" onclick="closeAllPanels()">About</a>
                <a href="/bookings" class="nav-link" onclick="closeAllPanels()">Bookings</a>
                <a href="/observations" class="nav-link" onclick="closeAllPanels()">Observation archive</a>
                <a href="/support" class="nav-link" onclick="closeAllPanels()">Support</a>
                <a href="/live" class="nav-link" onclick="closeAllPanels()">Live status</a>
                {% if is_admin %}
                <a href="/admin" class="nav-link" onclick="closeAllPanels()">Admin</a>
                {% endif %}
                <span class="nav-spacer"></span>
                {% if name == "" %}
                <a href="/auth/login" class="nav-link">Login</a>
                {% else %}
                <button class="nav-user-toggle" onclick="toggleUser()">
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                    </svg>
                    {{ name }}
                </button>
                <div class="nav-user-dropdown">
                    <a href="/account" class="nav-link" onclick="closeAllPanels()">Account</a>
                    <a href="/auth/logout" class="nav-link">Log out</a>
                </div>
                {% endif %}
            </nav>
        </header>
        <div id="page">
            {{ content }}
        </div>
        <footer>
            Made by weirdos 🦆 ({% if build_url == "" %} {{version_description}} {% else %} <a href={{build_url}}>build</a> {% endif %})
        </footer>
        <div id="lightbox" onclick="this.classList.add('hidden');this.classList.remove('flex')" class="hidden fixed inset-0 bg-black/85 z-[1000] cursor-zoom-out items-center justify-center p-8">
            <img id="lightbox-img" class="max-w-[90vw] max-h-[90vh] object-contain rounded shadow-[0_0_60px_rgba(0,0,0,0.5)]">
        </div>
        <script>
            document.addEventListener('click', function(e) {
                if (e.target.tagName === 'IMG' && e.target.closest('figure')) {
                    document.getElementById('lightbox-img').src = e.target.src;
                    var lb = document.getElementById('lightbox');
                    lb.classList.remove('hidden');
                    lb.classList.add('flex');
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    var lb = document.getElementById('lightbox');
                    lb.classList.add('hidden');
                    lb.classList.remove('flex');
                }
            });
        </script>
    </body>
</html>
