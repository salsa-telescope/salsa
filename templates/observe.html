<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<div id="observe-section" class="section light">
  <div id="errors" class="mb-1"></div>
  {% if in_maintenance %}
  <div class="text-sm font-semibold text-yellow-700 bg-yellow-50 border border-yellow-300 rounded px-3 py-2 mb-2">
    This telescope is currently in maintenance mode.
  </div>
  {% endif %}

  <div class="flex flex-col lg:flex-row gap-6">

    <!-- Left column: controls -->
    <div class="lg:w-1/3 space-y-3">

      <!-- Telescope status (polled every 1s) — includes h2 heading + status badge -->
      <div id="telescope-status" hx-get="/telescope/{{ info.id }}/state" hx-trigger="every 1s">{{ state_html }}</div>

      <!-- Booking warning (shown at T-5min) -->
      <div id="booking-warning" class="hidden text-sm font-semibold text-yellow-700 bg-yellow-50 border border-yellow-300 rounded px-3 py-2"></div>

      <!-- Target input -->
      <div>
        <form class="space-y-2">
          <div class="flex gap-2 items-end">
            <div class="w-28 flex-shrink-0">
              <label class="block text-sm text-gray-600">Target</label>
              <select name="coordinate_system" class="border rounded px-2 py-1 bg-white w-full text-sm">
                <option value="galactic" {% if target_mode=="galactic" %}selected="selected"{% endif %}>Galactic</option>
                <option value="equatorial" {% if target_mode=="equatorial" %}selected="selected"{% endif %}>Equatorial</option>
                <option value="horizontal" {% if target_mode=="horizontal" %}selected="selected"{% endif %}>Horizontal</option>
                {% if info.stow_position.is_some() %}<option value="stow">Stow</option>{% endif %}
              </select>
            </div>
            <div class="flex-1">
              <label for="x" class="block text-sm text-gray-600">
                {% if target_mode == "galactic" %}Long. [deg]
                {% else if target_mode == "equatorial" %}R.A. [deg]
                {% else %}Az. [deg]
                {% endif %}
              </label>
              <input type="text" name="x" value="{{ commanded_x }}"
                class="border rounded px-2 py-1 bg-white w-full text-sm" />
            </div>
            <div class="flex-1">
              <label for="y" class="block text-sm text-gray-600">
                {% if target_mode == "galactic" %}Lat. [deg]
                {% else if target_mode == "equatorial" %}Dec. [deg]
                {% else %}El. [deg]
                {% endif %}
              </label>
              <input type="text" name="y" value="{{ commanded_y }}"
                class="border rounded px-2 py-1 bg-white w-full text-sm" />
            </div>
            <button id="track-btn"
              hx-post="/observe/{{ info.id }}/set-target"
              hx-swap="none"
              class="px-3 py-1 bg-indigo-600 text-white rounded-md hover:bg-indigo-500 text-sm flex-shrink-0"
            >
              Track
            </button>
            <button id="stop-btn"
              hx-post="/observe/{{ info.id }}/stop-telescope"
              hx-swap="none"
              class="px-3 py-1 bg-red-600 text-white rounded-md hover:bg-red-500 text-sm flex-shrink-0 hidden"
            >
              Stop
            </button>
          </div>
        </form>
      </div>

      <!-- Calculated + current position -->
      <div id="position-display"
        class="text-sm grid items-baseline gap-x-1"
        style="grid-template-columns: 3.5rem 1.5rem auto 1.5rem auto"
        hx-get="/observe/{{ info.id }}/preview"
        hx-trigger="load, every 1s"
        hx-include="[name='coordinate_system'],[name='x'],[name='y']">
      </div>

      <!-- Measurement controls -->
      <div>
        <h3 class="text-sm font-semibold text-gray-700 mb-2">Observe</h3>
        <div class="flex gap-2 items-center">
          <button
            id="observe-btn"
            hx-post="/observe/{{ info.id }}/observe"
            hx-swap="none"
            hx-on::before-request="document.getElementById('errors').innerHTML=''"
            class="px-3 py-1 bg-indigo-600 text-white rounded-md hover:bg-indigo-500 text-sm"
          >
            Observe
          </button>
          <button
            id="stop-obs-btn"
            hx-post="/observe/{{ info.id }}/stop"
            hx-swap="none"
            class="px-3 py-1 bg-red-600 text-white rounded-md hover:bg-red-500 text-sm hidden"
          >
            Stop
          </button>
          <span id="obs-timer" class="text-sm text-gray-500 hidden">
            <span id="obs-elapsed">0</span>s
          </span>
        </div>
      </div>

    </div>

    <!-- Right column: live spectrum chart -->
    <div class="lg:w-2/3">
      <h2 class="mb-2 font-semibold">Live spectrum</h2>
      <p id="obs-time-display" class="text-sm text-gray-500 mb-2 hidden"></p>
      <div id="chart">
        <!-- FIXME: maybe don't reload this javascript on each htmx fetch of this page? -->
        <script src="/observe_chart.js"></script>
        <button id="observe-axis-toggle" style="display: none;"
          onclick="toggleObserveAxis()"
          class="px-2 py-1 mt-1 bg-gray-200 text-sm rounded hover:bg-gray-300 mx-auto block">
          Show frequency
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  let bookingEndTime = null;
  let warningSent = false;
  let bookingEnded = false;

  async function fetchBookingEndTime() {
      try {
          const res = await fetch('/observe/{{ info.id }}/booking-end-time');
          const text = (await res.text()).trim();
          bookingEndTime = text ? new Date(text) : null;
      } catch (_) {}
  }

  function updateBookingCountdown() {
      const inlineEl = document.getElementById('booking-countdown-inline');
      const warningEl = document.getElementById('booking-warning');

      if (bookingEnded || !bookingEndTime) return;

      const remaining = Math.floor((bookingEndTime - Date.now()) / 1000);

      if (remaining <= 0) {
          bookingEnded = true;
          if (inlineEl) { inlineEl.textContent = ''; }
          if (warningEl) { warningEl.classList.add('hidden'); }
          window.location.href = '/observe/{{ info.id }}/not-available';
          return;
      }

      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      const mm = String(mins).padStart(2, '0');
      const ss = String(secs).padStart(2, '0');

      if (inlineEl) {
          if (remaining <= 300) {
              inlineEl.className = 'font-normal text-yellow-600 text-base';
          } else {
              inlineEl.className = 'font-normal text-gray-400 text-base';
          }
          inlineEl.textContent = ' \u2014 Time left: ' + mm + ':' + ss;
      }

      if (remaining <= 300 && !warningSent) {
          warningSent = true;
          if (warningEl) {
              warningEl.textContent = 'Booking ending soon, please stow telescope or extend booking.';
              warningEl.classList.remove('hidden');
          }
      }
  }

  function coordinateSystemChanged(e) {
      const x_label = document.querySelector("form label[for='x']");
      const y_label = document.querySelector("form label[for='y']");
      const inputX = document.querySelector("form input[name='x']");
      const inputY = document.querySelector("form input[name='y']");
      switch (e.target.value) {
      case "galactic":
          x_label.textContent = "Long. [deg]"
          y_label.textContent = "Lat. [deg]"
          break;
      case "equatorial":
          x_label.textContent = "R.A. [deg]"
          y_label.textContent = "Dec. [deg]"
          break;
      case "horizontal":
          x_label.textContent = "Az. [deg]"
          y_label.textContent = "El. [deg]"
          break;
      case "stow":
          x_label.textContent = "Az. [deg]"
          y_label.textContent = "El. [deg]"
          inputX.value = '';
          inputY.value = '';
          break;
      }
      updateTrackStopButtons();
  }

  let obsTimerInterval = null;
  let obsStartTime = null;

  function updateObsTimer() {
      const measuringEl = document.getElementById('measuring-state');
      if (!measuringEl) return;
      const isMeasuring = measuringEl.dataset.measuring === 'true';
      const serverSecs = parseInt(measuringEl.dataset.obsSecs || '0', 10);
      const timerEl = document.getElementById('obs-timer');
      const elapsedEl = document.getElementById('obs-elapsed');
      const displayEl = document.getElementById('obs-time-display');

      if (isMeasuring && obsTimerInterval === null) {
          obsStartTime = Date.now();
          timerEl.classList.remove('hidden');
          obsTimerInterval = setInterval(function () {
              const secs = Math.floor((Date.now() - obsStartTime) / 1000);
              elapsedEl.textContent = secs;
              if (displayEl) {
                  displayEl.textContent = 'Integrating: ' + secs + 's';
                  displayEl.classList.remove('hidden');
              }
          }, 1000);
      } else if (!isMeasuring && obsTimerInterval !== null) {
          clearInterval(obsTimerInterval);
          obsTimerInterval = null;
          obsStartTime = null;
          timerEl.classList.add('hidden');
          elapsedEl.textContent = '0';
          if (displayEl) {
              if (serverSecs > 0) {
                  displayEl.textContent = 'Integration time: ' + serverSecs + 's';
                  displayEl.classList.remove('hidden');
              } else {
                  displayEl.classList.add('hidden');
              }
          }
      } else if (!isMeasuring && obsTimerInterval === null && displayEl) {
          // Page load with existing observation data
          if (serverSecs > 0) {
              displayEl.textContent = 'Integration time: ' + serverSecs + 's';
              displayEl.classList.remove('hidden');
          }
      }
  }

  function setObservingState(observing) {
      document.getElementById('observe-btn').classList.toggle('hidden', observing);
      document.getElementById('stop-obs-btn').classList.toggle('hidden', !observing);
  }

  function setTrackingState(tracking) {
      document.getElementById('track-btn').classList.toggle('hidden', tracking);
      document.getElementById('stop-btn').classList.toggle('hidden', !tracking);
      const select = document.querySelector("form select[name='coordinate_system']");
      const inputX = document.querySelector("form input[name='x']");
      const inputY = document.querySelector("form input[name='y']");
      const isStow = select.value === 'stow';
      select.style.pointerEvents = tracking ? 'none' : '';
      select.classList.toggle('opacity-50', tracking);
      inputX.readOnly = tracking || isStow;
      inputX.classList.toggle('opacity-50', tracking || isStow);
      inputY.readOnly = tracking || isStow;
      inputY.classList.toggle('opacity-50', tracking || isStow);
  }

  function updateTrackStopButtons() {
      const statusSpan = document.querySelector('#telescope-status h2 span');
      const status = statusSpan ? statusSpan.textContent.trim() : 'Idle';
      const isTracking = status === 'Tracking';
      const isIdle = status === 'Idle';
      setTrackingState(!isIdle);
      const measuringEl = document.getElementById('measuring-state');
      const isMeasuring = measuringEl && measuringEl.dataset.measuring === 'true';
      setObservingState(isMeasuring);
  }

  document.addEventListener('htmx:afterSwap', function (evt) {
      if (evt.detail.target.id === 'telescope-status') {
          updateObsTimer();
          updateTrackStopButtons();
          updateBookingCountdown();
      }
      if (evt.detail.target.id === 'errors' && evt.detail.target.innerHTML.trim() !== '') {
          setTrackingState(false);
          setObservingState(false);
      }
  });

  function pageLoad() {
      const coordinateSystemDropdown = document.querySelector("form select[name='coordinate_system']");
      coordinateSystemDropdown.addEventListener("change", coordinateSystemChanged);
      updateObsTimer();
      updateTrackStopButtons();
      fetchBookingEndTime().then(updateBookingCountdown);
      setInterval(async function() {
          await fetchBookingEndTime();
          updateBookingCountdown();
      }, 1000);
  }

  pageLoad();
</script>
