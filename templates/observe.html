<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<div id="observe-section" class="section light">
  <div id="errors" class="mb-1"></div>

  <div class="flex flex-col lg:flex-row gap-6">

    <!-- Left column: controls -->
    <div class="lg:w-1/3 space-y-3">

      <!-- Telescope status (polled every 1s) — includes h2 heading + status badge -->
      <div id="telescope-status" hx-get="/telescope/{{ info.id }}/state" hx-trigger="every 1s">{{ state_html }}</div>

      <!-- Target input -->
      <div>
        <form class="space-y-2">
          <div class="flex gap-2 items-end">
            <div class="w-28 flex-shrink-0">
              <label class="block text-sm text-gray-600">Target</label>
              <select name="coordinate_system" class="border rounded px-2 py-1 bg-white w-full text-sm">
                <option value="galactic" {% if target_mode=="galactic" %}selected="selected"{% endif %}>Galactic</option>
                <option value="equatorial" {% if target_mode=="equatorial" %}selected="selected"{% endif %}>Equatorial</option>
                <option value="horizontal" {% if target_mode=="horizontal" %}selected="selected"{% endif %}>Horizontal</option>
              </select>
            </div>
            <div class="flex-1">
              <label for="x" class="block text-sm text-gray-600">
                {% if target_mode == "galactic" %}Long. [deg]
                {% else if target_mode == "equatorial" %}R.A. [deg]
                {% else %}Az. [deg]
                {% endif %}
              </label>
              <input type="text" name="x" value="{{ commanded_x }}"
                class="border rounded px-2 py-1 bg-white w-full text-sm" />
            </div>
            <div class="flex-1">
              <label for="y" class="block text-sm text-gray-600">
                {% if target_mode == "galactic" %}Lat. [deg]
                {% else if target_mode == "equatorial" %}Dec. [deg]
                {% else %}El. [deg]
                {% endif %}
              </label>
              <input type="text" name="y" value="{{ commanded_y }}"
                class="border rounded px-2 py-1 bg-white w-full text-sm" />
            </div>
          </div>
          <button
            hx-post="/observe/{{ info.id }}/set-target"
            hx-swap="none"
            class="px-3 py-1 bg-indigo-600 text-white rounded-md hover:bg-indigo-500 text-sm"
          >
            Track target
          </button>
        </form>
      </div>

      <!-- Observation controls -->
      <div>
        <div class="flex gap-2 items-center">
          <button
            hx-post="/observe/{{ info.id }}/observe"
            hx-swap="none"
            class="px-3 py-1 bg-indigo-600 text-white rounded-md hover:bg-indigo-500 text-sm"
          >
            Start
          </button>
          <button
            hx-post="/observe/{{ info.id }}/stop"
            hx-swap="none"
            class="px-3 py-1 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400 text-sm"
          >
            Stop
          </button>
          <span id="obs-timer" class="text-sm text-gray-500 hidden">
            <span id="obs-elapsed">0</span>s
          </span>
        </div>
      </div>

    </div>

    <!-- Right column: live spectrum chart -->
    <div class="lg:w-2/3">
      <h2 class="mb-2 font-semibold">Live spectrum</h2>
      <p id="obs-time-display" class="text-sm text-gray-500 mb-2 hidden"></p>
      <div id="chart">
        <!-- FIXME: maybe don't reload this javascript on each htmx fetch of this page? -->
        <script src="/observe_chart.js"></script>
        <button id="observe-axis-toggle" style="display: none;"
          onclick="toggleObserveAxis()"
          class="px-2 py-1 mt-1 bg-gray-200 text-sm rounded hover:bg-gray-300 mx-auto block">
          Show frequency
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  function coordinateSystemChanged(e) {
      const x_label = document.querySelector("form label[for='x']");
      const y_label = document.querySelector("form label[for='y']");
      switch (e.target.value) {
      case "galactic":
          x_label.textContent = "Long. [deg]"
          y_label.textContent = "Lat. [deg]"
          break;
      case "equatorial":
          x_label.textContent = "R.A. [deg]"
          y_label.textContent = "Dec. [deg]"
          break;
      case "horizontal":
          x_label.textContent = "Az. [deg]"
          y_label.textContent = "El. [deg]"
          break;
      }
  }

  let obsTimerInterval = null;
  let obsStartTime = null;

  function updateObsTimer() {
      const measuringEl = document.getElementById('measuring-state');
      if (!measuringEl) return;
      const isMeasuring = measuringEl.dataset.measuring === 'true';
      const serverSecs = parseInt(measuringEl.dataset.obsSecs || '0', 10);
      const timerEl = document.getElementById('obs-timer');
      const elapsedEl = document.getElementById('obs-elapsed');
      const displayEl = document.getElementById('obs-time-display');

      if (isMeasuring && obsTimerInterval === null) {
          obsStartTime = Date.now();
          timerEl.classList.remove('hidden');
          obsTimerInterval = setInterval(function () {
              const secs = Math.floor((Date.now() - obsStartTime) / 1000);
              elapsedEl.textContent = secs;
              if (displayEl) {
                  displayEl.textContent = 'Integrating: ' + secs + 's';
                  displayEl.classList.remove('hidden');
              }
          }, 1000);
      } else if (!isMeasuring && obsTimerInterval !== null) {
          clearInterval(obsTimerInterval);
          obsTimerInterval = null;
          obsStartTime = null;
          timerEl.classList.add('hidden');
          elapsedEl.textContent = '0';
          if (displayEl) {
              if (serverSecs > 0) {
                  displayEl.textContent = 'Integration time: ' + serverSecs + 's';
                  displayEl.classList.remove('hidden');
              } else {
                  displayEl.classList.add('hidden');
              }
          }
      } else if (!isMeasuring && obsTimerInterval === null && displayEl) {
          // Page load with existing observation data
          if (serverSecs > 0) {
              displayEl.textContent = 'Integration time: ' + serverSecs + 's';
              displayEl.classList.remove('hidden');
          }
      }
  }

  document.addEventListener('htmx:afterSwap', function (evt) {
      if (evt.detail.target.id === 'telescope-status') {
          updateObsTimer();
      }
  });

  function pageLoad() {
      const coordinateSystemDropdown = document.querySelector("form select[name='coordinate_system']");
      coordinateSystemDropdown.addEventListener("change", coordinateSystemChanged);
      updateObsTimer();
  }

  pageLoad();
</script>
