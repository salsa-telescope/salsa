<span id="measuring-state"
  data-measuring="{{ info.measurement_in_progress }}"
  data-obs-secs="{% if let Some(obs) = info.latest_observation %}{{ obs.observation_time.as_secs() }}{% else %}0{% endif %}"
  class="hidden"></span>

<h2 class="text-xl font-semibold mb-3">Telescope &mdash; {{ info.id }} &mdash;
  {% if status == "Idle" %}
  <span class="text-info">Idle</span>
  {% else if status == "Slewing" %}
  <span class="text-warning">Slewing</span>
  {% else if status == "Tracking" %}
  <span class="text-success">Tracking</span>
  {% else %}
  <span>{{ status }}</span>
  {% endif %}
  <span id="booking-countdown-inline" class="font-normal text-gray-400 text-base"></span>
</h2>

{% if !error.is_empty() %}
<p class="text-danger text-sm mb-2">{{ error }}</p>
{% endif %}
