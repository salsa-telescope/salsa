<span id="measuring-state"
  data-measuring="{{ info.measurement_in_progress }}"
  data-obs-secs="{% if let Some(obs) = info.latest_observation %}{{ obs.observation_time.as_secs() }}{% else %}0{% endif %}"
  class="hidden"></span>

<h2 class="font-semibold mb-3">Telescope control &mdash; {{ info.id }} &mdash;
  {% if status == "Idle" %}
  <span class="text-blue-600">Idle</span>
  {% else if status == "Slewing" %}
  <span class="text-yellow-500">Slewing</span>
  {% else if status == "Tracking" %}
  <span class="text-green-600">Tracking</span>
  {% else %}
  <span>{{ status }}</span>
  {% endif %}
</h2>

{% if !error.is_empty() %}
<p class="text-red-600 text-sm mb-2">{{ error }}</p>
{% endif %}
