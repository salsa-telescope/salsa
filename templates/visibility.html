<div class="section light space-y-6">

  <div class="space-y-2">
    <p class="text-sm text-gray-500">
      <a href="/support">← {{ lang.t("vis-back") }}</a>
    </p>
    <h2 class="text-3xl font-semibold">{{ lang.t("vis-heading") }}</h2>
    <p class="text-sm text-gray-500">
      {{ lang.t("vis-intro-1") }} {{ tz_name }}.
      <strong>15°</strong> — {{ lang.t("vis-intro-2") }}
    </p>
  </div>

  <form method="get" action="/visibility" class="space-y-3 text-sm bg-gray-50 border border-gray-200 rounded-lg p-4">
    <div class="flex flex-wrap gap-3 items-end">
      <div>
        <label class="block text-gray-600 mb-1">{{ lang.t("vis-coord-system") }}</label>
        <select id="coord-select" name="coord" onchange="updateXYVisibility()" class="border rounded px-2 py-1 bg-white">
          <option value="galactic" {% if coord == "galactic" %}selected{% endif %}>{{ lang.t("observe-coord-galactic") }}</option>
          <option value="equatorial" {% if coord == "equatorial" %}selected{% endif %}>{{ lang.t("vis-coord-equatorial") }}</option>
          <option value="sun" {% if coord == "sun" %}selected{% endif %}>{{ lang.t("observe-coord-sun") }}</option>
        </select>
      </div>
      <div id="x-field">
        <label class="block text-gray-600 mb-1" id="x-label">X</label>
        <input type="number" name="x" value="{{ x }}" step="0.01" class="border rounded px-2 py-1 bg-white w-32" />
      </div>
      <div id="y-field">
        <label class="block text-gray-600 mb-1" id="y-label">Y</label>
        <input type="number" name="y" value="{{ y }}" step="0.01" class="border rounded px-2 py-1 bg-white w-32" />
      </div>
      <div>
        <label class="block text-gray-600 mb-1">{{ lang.t("vis-date") }} ({{ tz_name }})</label>
        <input type="date" name="date" value="{{ date }}" class="border rounded px-2 py-1 bg-white" />
      </div>
      <button type="submit" class="btn">{{ lang.t("vis-compute") }}</button>
    </div>
  </form>

  {% if let Some(err) = error %}
  <p class="callout">{{ err }}</p>
  {% endif %}

  {% if let Some(res) = result %}
  <div class="overflow-x-auto">{{ res.svg|safe }}</div>
  <p class="text-xs text-gray-500">{{ lang.t("vis-hover-hint") }}</p>
  {% endif %}

  <script>
    function updateXYVisibility() {
        const coord = document.getElementById('coord-select').value;
        const xField = document.getElementById('x-field');
        const yField = document.getElementById('y-field');
        const xLabel = document.getElementById('x-label');
        const yLabel = document.getElementById('y-label');
        const isSun = coord === 'sun';
        xField.style.display = isSun ? 'none' : '';
        yField.style.display = isSun ? 'none' : '';
        if (coord === 'galactic') {
            xLabel.textContent = "{{ lang.t("vis-lbl-glon") }}";
            yLabel.textContent = "{{ lang.t("vis-lbl-glat") }}";
        } else if (coord === 'equatorial') {
            xLabel.textContent = "{{ lang.t("vis-lbl-ra") }}";
            yLabel.textContent = "{{ lang.t("vis-lbl-dec") }}";
        }
    }
    updateXYVisibility();

    // Crosshair readout: the SVG from visibility.rs carries the sampled
    // curve ("HH:MM,elevation" pairs) and plot geometry as data attributes,
    // plus a hidden .vis-cursor group. Pointer moves snap the cursor to the
    // nearest sample; pointerdown makes it work on touch screens too.
    (function () {
        const svg = document.querySelector('svg[data-samples]');
        if (!svg) return;
        const samples = svg.dataset.samples.split(';').map(function (pair) {
            const parts = pair.split(',');
            return { label: parts[0], el: parseFloat(parts[1]) };
        });
        const mLeft = parseFloat(svg.dataset.mleft);
        const mTop = parseFloat(svg.dataset.mtop);
        const plotW = parseFloat(svg.dataset.plotw);
        const plotH = parseFloat(svg.dataset.ploth);
        const cursor = svg.querySelector('.vis-cursor');
        const line = svg.querySelector('.vis-cursor-line');
        const dot = svg.querySelector('.vis-cursor-dot');
        const text = svg.querySelector('.vis-cursor-text');
        const capture = svg.querySelector('.vis-capture');
        const viewW = svg.viewBox.baseVal.width;

        function show(evt) {
            // The SVG scales to its container with preserved aspect ratio,
            // so screen-to-viewBox is a plain proportional mapping.
            const rect = svg.getBoundingClientRect();
            const xView = (evt.clientX - rect.left) * viewW / rect.width;
            const frac = Math.min(1, Math.max(0, (xView - mLeft) / plotW));
            const i = Math.round(frac * (samples.length - 1));
            const s = samples[i];
            const x = mLeft + (i / (samples.length - 1)) * plotW;
            const y = mTop + (90 - Math.min(90, Math.max(0, s.el))) / 90 * plotH;
            line.setAttribute('x1', x);
            line.setAttribute('x2', x);
            dot.setAttribute('cx', x);
            dot.setAttribute('cy', y);
            text.textContent = s.label + ' · ' + s.el.toFixed(1) + '°';
            const onLeftHalf = x < mLeft + plotW / 2;
            text.setAttribute('x', onLeftHalf ? x + 8 : x - 8);
            text.setAttribute('text-anchor', onLeftHalf ? 'start' : 'end');
            cursor.setAttribute('visibility', 'visible');
        }

        capture.addEventListener('pointermove', show);
        capture.addEventListener('pointerdown', show);
        capture.addEventListener('pointerleave', function () {
            cursor.setAttribute('visibility', 'hidden');
        });
    })();
  </script>
</div>
