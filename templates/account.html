<div class="section light">
  <h2 class="text-xl font-semibold mb-4">Account</h2>
  <dl class="text-sm space-y-2 grid grid-cols-[max-content_auto] gap-x-4 gap-y-1">
    <dt class="text-gray-500">Username</dt>
    <dd>{{ user.name }}</dd>
    <dt class="text-gray-500">Provider</dt>
    <dd>{{ user.provider }}</dd>
    <dt class="text-gray-500">SALSA user ID</dt>
    <dd>{{ user.id }}</dd>
    <dt class="text-gray-500">Account type</dt>
    <dd>{% if user.is_admin %}Admin{% else %}User{% endif %}</dd>
  </dl>
  <div class="mt-6 pt-4 border-t border-gray-200">
    <button
      hx-post="/account/delete"
      hx-confirm="Are you sure? This will anonymise your account and cancel any upcoming bookings. Past bookings and observations will be retained. If you want to remove your observations, please delete them on the Observations page first."
      class="px-3 py-1 bg-red-600 text-white rounded-md hover:bg-red-500 text-sm">
      Delete account
    </button>
  </div>
</div>
