<div class="section light">
  <h2 class="text-xl font-semibold mb-4">Webcam</h2>
  <div class="rounded shadow" style="position: relative; width: 100%; aspect-ratio: 32/9; overflow: hidden;">
    <img id="webcam-a" src="/webcam/snapshot" style="position: absolute; top: 0; left: 0; width: 100%;" alt="Telescope webcam" />
    <img id="webcam-b" src="" style="position: absolute; top: 0; left: 0; width: 100%; opacity: 0;" alt="" />
  </div>
  <p class="text-gray-700 mt-3">Image updated every 2 seconds. The telescopes have no lights and are not visible after dark, but can still be controlled.</p>
</div>

<script>
  (function () {
    let current = document.getElementById('webcam-a');
    let next = document.getElementById('webcam-b');
    function refresh() {
      const url = '/webcam/snapshot?t=' + Date.now();
      next.onload = function () {
        next.style.opacity = '1';
        current.style.opacity = '0';
        [current, next] = [next, current];
      };
      next.src = url;
    }
    setInterval(refresh, 2000);
  })();
</script>
