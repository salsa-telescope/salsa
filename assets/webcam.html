<div class="section light">
  <h2 class="font-semibold mb-4">Webcam</h2>
  <div class="overflow-hidden rounded shadow" style="aspect-ratio: 32/9;">
    <img id="webcam-img" src="/webcam/snapshot" class="w-full" alt="Telescope webcam" />
  </div>
</div>

<script>
  (function () {
    const img = document.getElementById('webcam-img');
    setInterval(function () {
      img.src = '/webcam/snapshot?t=' + Date.now();
    }, 2000);
  })();
</script>
