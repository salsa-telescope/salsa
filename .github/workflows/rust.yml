name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to SALSA webserver'
        type: boolean
        default: false
  release:
    types: [published]
env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Install libuhd
        run: sudo apt-get update && sudo apt-get install -y libuhd-dev
      - name: Cache target folder
        uses: actions/cache@v6
        with:
          path: target/release
          # Include the dependency lockfile in the key so the cache is
          # re-saved whenever dependencies change; a fixed key is only
          # saved once and then goes stale forever.
          key: ${{ runner.os }}-rust-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-build-
      - name: Build
        run: cargo build --verbose --release
      - uses: actions/upload-artifact@v6
        with:
          name: salsa
          path: |
            target/release/salsa
            sql_migrations/**
            assets/**
      - name: Run tests
        run: cargo test --verbose --release
      - name: Check format
        run: cargo fmt --check --verbose
      - name: Clippy
        run: cargo clippy --all-targets --release -- -D warnings

  deploy:
    needs: build
    runs-on: salsa
    if: github.event_name == 'release'
    environment: Onsala

    concurrency:
      group: deploy-main
      cancel-in-progress: false

    steps:
      - name: Stop salsa
        run: |
          sudo systemctl stop salsa.service
      - uses: actions/download-artifact@v7
        with:
          name: salsa
          path: /home/salsa/bin
      - name: Change permissions
        run: |
          chgrp -R salsaowners /home/salsa/bin/target /home/salsa/bin/sql_migrations /home/salsa/bin/assets
          chmod -R g+r /home/salsa/bin/target /home/salsa/bin/sql_migrations /home/salsa/bin/assets
          chmod g+rx /home/salsa/bin/target/release/salsa
      - name: Start salsa if enabled
        run: |
          if systemctl is-enabled -q salsa.service; then
            sudo systemctl start salsa.service
          fi
